<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrackPay Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#1e293b;
color:white;
}

.logo{
font-size:22px;
font-weight:bold;
}

.logout-btn{
background:#ef4444;
border:none;
padding:8px 14px;
color:white;
border-radius:6px;
cursor:pointer;
}

.logout-btn:hover{
background:#dc2626;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.income-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:25px;
}

input{
padding:10px;
width:200px;
margin-right:10px;
}

button{
padding:10px 15px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.jars{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.jar{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.jar h3{
margin-bottom:10px;
}

.amount{
font-size:20px;
font-weight:bold;
color:#1e293b;
}

.chart-box{
margin-top:40px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<header>

<div class="logo">TrackPay</div>

<button class="logout-btn" onclick="logout()">Logout</button>

</header>


<div class="container">

<div class="income-box">

<h2>Add Income</h2>

<input id="incomeInput" type="number" placeholder="Enter income">

<button onclick="addIncome()">Distribute</button>

</div>

<div class="income-box">

<h2>Withdraw from Jar</h2>

<select id="jarSelect">
<option value="nec">NEC - Necessity</option>
<option value="ffa">FFA - Financial Freedom</option>
<option value="edu">EDU - Education</option>
<option value="ltss">LTSS - Long Term Saving</option>
<option value="play">PLAY - Playing</option>
<option value="give">GIVE - Giving</option>
</select>

<input id="withdrawAmount" type="number" placeholder="Amount">

<button onclick="withdrawMoney()">Withdraw</button>

</div>


<div class="jars">

<div class="jar">
<h3>NEC</h3>
<p>Necessity</p>
<div class="amount" id="nec">$0</div>
</div>

<div class="jar">
<h3>FFA</h3>
<p>Financial Freedom</p>
<div class="amount" id="ffa">$0</div>
</div>

<div class="jar">
<h3>EDU</h3>
<p>Education</p>
<div class="amount" id="edu">$0</div>
</div>

<div class="jar">
<h3>LTS</h3>
<p>Long-term Saving</p>
<div class="amount" id="ltss">$0</div>
</div>

<div class="jar">
<h3>PLAY</h3>
<p>Playing</p>
<div class="amount" id="play">$0</div>
</div>

<div class="jar">
<h3>GIVE</h3>
<p>Giving</p>
<div class="amount" id="give">$0</div>
</div>

</div>


<div class="chart-box">

<h2>Money Distribution</h2>

<canvas id="jarChart"></canvas>

</div>

</div>


<script type="module" src="auth.js"></script>


<script>

let totals={
nec:0,
ffa:0,
edu:0,
ltss:0,
play:0,
give:0
}

function addIncome(){

const income=parseFloat(document.getElementById("incomeInput").value)

if(!income){
alert("Enter valid income")
return
}

/* 6 Jars rule */

totals.nec += income*0.55
totals.ffa += income*0.10
totals.edu += income*0.10
totals.ltss += income*0.10
totals.play += income*0.10
totals.give += income*0.05

updateUI()
updateChart()

}


function updateUI(){

document.getElementById("nec").innerText="$"+totals.nec.toFixed(2)
document.getElementById("ffa").innerText="$"+totals.ffa.toFixed(2)
document.getElementById("edu").innerText="$"+totals.edu.toFixed(2)
document.getElementById("ltss").innerText="$"+totals.ltss.toFixed(2)
document.getElementById("play").innerText="$"+totals.play.toFixed(2)
document.getElementById("give").innerText="$"+totals.give.toFixed(2)

}


const ctx=document.getElementById("jarChart")

const jarChart=new Chart(ctx,{
type:"pie",
data:{
labels:["NEC","FFA","EDU","LTS","PLAY","GIVE"],
datasets:[{
data:[0,0,0,0,0,0]
}]
}
})


function updateChart(){

jarChart.data.datasets[0].data=[
totals.nec,
totals.ffa,
totals.edu,
totals.ltss,
totals.play,
totals.give
]

jarChart.update()

}

</script>


</body>
</html>
