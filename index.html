<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Trackpay - 6 Jars Budget Manager</title>

<style>
<link rel="stylesheet" href="/css/style.css">

<header class="header">
<h1>TrackPay</h1>
<p>Smart Budget Management</p>
</header>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

.input-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
padding:10px;
margin-right:10px;
}

button{
padding:10px 15px;
background:#28a745;
border:none;
color:white;
cursor:pointer;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.jar{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.amount{
font-size:20px;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Trackpay</h1>
<p style="text-align:center;">6 Jars Money Management</p>

<div class="input-box">

<h3>Add Income</h3>

<input type="number" id="income" placeholder="Enter income">

<button onclick="addIncome()">Add</button>

</div>

<div class="dashboard">

<div class="jar">
<h3>NEC</h3>
<div id="nec" class="amount">0</div>
</div>

<div class="jar">
<h3>FFA</h3>
<div id="ffa" class="amount">0</div>
</div>

<div class="jar">
<h3>EDU</h3>
<div id="edu" class="amount">0</div>
</div>

<div class="jar">
<h3>LTSS</h3>
<div id="ltss" class="amount">0</div>
</div>

<div class="jar">
<h3>PLAY</h3>
<div id="play" class="amount">0</div>
</div>

<div class="jar">
<h3>GIVE</h3>
<div id="give" class="amount">0</div>
</div>

</div>

<h2>History</h2>

<table>

<thead>
<tr>
<th>Date</th>
<th>Income</th>
<th>NEC</th>
<th>FFA</th>
<th>EDU</th>
<th>LTSS</th>
<th>PLAY</th>
<th>GIVE</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

function calculateJars(income){

return{
nec:income*0.55,
ffa:income*0.10,
edu:income*0.10,
ltss:income*0.10,
play:income*0.10,
give:income*0.05
}

}

function addIncome(){

let income=parseFloat(document.getElementById("income").value)

if(!income)return

let jars=calculateJars(income)

document.getElementById("nec").innerText=jars.nec.toFixed(2)
document.getElementById("ffa").innerText=jars.ffa.toFixed(2)
document.getElementById("edu").innerText=jars.edu.toFixed(2)
document.getElementById("ltss").innerText=jars.ltss.toFixed(2)
document.getElementById("play").innerText=jars.play.toFixed(2)
document.getElementById("give").innerText=jars.give.toFixed(2)

let history=JSON.parse(localStorage.getItem("history"))||[]

history.push({
date:new Date().toLocaleDateString(),
income:income,
...jars
})

localStorage.setItem("history",JSON.stringify(history))

loadHistory()

}

function loadHistory(){

let history=JSON.parse(localStorage.getItem("history"))||[]

let table=document.getElementById("history")

table.innerHTML=""

history.forEach(item=>{

table.innerHTML+=`
<tr>
<td>${item.date}</td>
<td>${item.income}</td>
<td>${item.nec.toFixed(2)}</td>
<td>${item.ffa.toFixed(2)}</td>
<td>${item.edu.toFixed(2)}</td>
<td>${item.ltss.toFixed(2)}</td>
<td>${item.play.toFixed(2)}</td>
<td>${item.give.toFixed(2)}</td>
</tr>
`

})

}

loadHistory()

</script>

</body>
</html>
